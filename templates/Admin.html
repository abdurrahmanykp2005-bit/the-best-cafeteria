<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Best Cafeteria Admin Panel</title>

<style>

body{
    margin:0;
    padding:40px;
    background:#111;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    color:gold;
    margin-bottom:30px;
}

input,
textarea{

    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;

}

textarea{
    height:120px;
}

button{

    background:gold;
    color:black;
    border:none;
    padding:15px 35px;
    font-size:18px;
    cursor:pointer;
    border-radius:8px;
    font-weight:bold;

}

button:hover{

    background:orange;

}

.card{

    background:#222;
    margin-top:20px;
    padding:20px;
    border-radius:10px;

}

.card img{

    width:150px;
    border-radius:10px;
    margin-top:10px;

}

.price{

    color:gold;
    font-size:22px;
    font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<h1>🍔 The Best Cafeteria Admin Panel</h1>

<input id="food_name" placeholder="Food Name">

<input id="category" placeholder="Category">

<input id="price" type="number" placeholder="Price">

<input id="image" placeholder="Image Name (example: Burger.png)">

<textarea id="description" placeholder="Description"></textarea>

<button onclick="addFood()">Add Food</button>

<hr>

<h2>All Foods</h2>

<div id="food-list"></div>

</div>

<script>

const API="http://127.0.0.1:5000";

async function loadFoods(){

    const response=await fetch(API+"/menu");

    const foods=await response.json();

    let html="";

    foods.forEach(food=>{

        html+=`

        <div class="card">

            <h2>${food.food_name}</h2>

            <p><b>Category:</b> ${food.category}</p>

            <p class="price">₹${food.price}</p>

            <p>${food.description}</p>

            <img src="/static/images/${food.image}" alt="${food.food_name}" width="150">
        </div>

        `;

    });

    document.getElementById("food-list").innerHTML=html;

}

async function addFood(){

    const food={

        food_name:document.getElementById("food_name").value,

        category:document.getElementById("category").value,

        price:parseFloat(document.getElementById("price").value),

        image:document.getElementById("image").value,

        description:document.getElementById("description").value

    };

    const response = await fetch(API+"/add-food",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(food)

    });

    const result=await response.json();

    alert(result.message);

    document.getElementById("food_name").value="";
    document.getElementById("category").value="";
    document.getElementById("price").value="";
    document.getElementById("image").value="";
    document.getElementById("description").value="";

    loadFoods();

}

loadFoods();

</script>

</body>
</html>
